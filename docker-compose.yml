services:
  tanya:
    build:
      context: .
      dockerfile: Dockerfile
    image: tanya:local
    container_name: tanya
    env_file:
      - .env
    volumes:
      - ./tanya-data:/root/.openclaw
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "openclaw gateway probe >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
